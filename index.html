<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Directory</title>

<style>
body {margin:0;font-family:sans-serif;background:#0f172a;color:white;}
.container{padding:15px;max-width:900px;margin:auto;}
input,button{padding:10px;width:100%;margin-top:8px;border-radius:10px;border:none;}
button{background:#3b82f6;color:white;font-weight:bold;}
.card{background:#1e293b;padding:10px;margin-top:10px;border-radius:15px;}
img{width:100%;border-radius:10px;}
.row{display:flex;gap:10px;}
.row button{flex:1;}
.hidden{display:none;}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>➕ Add / Edit Member</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="relation" placeholder="Relation">
<input type="file" id="photo">
<button onclick="saveMember()">Save Member</button>

<hr>

<input id="search" placeholder="Search..." onkeyup="loadMembers()">

<div id="list"></div>

</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>

// 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let editId = null;

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=>alert("Logged in"))
  .catch(e=>alert(e.message));
}

// SAVE (ADD / EDIT)
async function saveMember(){

  let photoURL = "";

  if(photo.files[0]){
    const file = photo.files[0];
    const ref = storage.ref("photos/" + Date.now() + file.name);
    await ref.put(file);
    photoURL = await ref.getDownloadURL();
  }

  const data = {
    name: name.value,
    phone: phone.value,
    address: address.value,
    relation: relation.value,
  };

  if(photoURL) data.photo = photoURL;

  if(editId){
    await db.collection("members").doc(editId).update(data);
    editId = null;
  } else {
    if(!data.photo) return alert("Photo required");
    await db.collection("members").add(data);
  }

  clearForm();
  loadMembers();
}

// LOAD MEMBERS
async function loadMembers(){

  const searchVal = search.value.toLowerCase();
  const snap = await db.collection("members").get();

  list.innerHTML = "";

  snap.forEach(doc=>{
    const m = doc.data();

    if(!m.name.toLowerCase().includes(searchVal)) return;

    list.innerHTML += `
      <div class="card">
        <img src="${m.photo}">
        <h3>${m.name}</h3>
        <p>${m.phone}</p>
        <p>${m.address}</p>
        <p>${m.relation}</p>

        <div class="row">
          <button onclick="editMember('${doc.id}','${m.name}','${m.phone}','${m.address}','${m.relation}')">Edit</button>
          <button onclick="deleteMember('${doc.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

// EDIT
function editMember(id,nameVal,phoneVal,addressVal,relationVal){
  editId = id;
  name.value = nameVal;
  phone.value = phoneVal;
  address.value = addressVal;
  relation.value = relationVal;
  window.scrollTo(0,0);
}

// DELETE
function deleteMember(id){
  if(confirm("Delete this member?")){
    db.collection("members").doc(id).delete();
    loadMembers();
  }
}

// CLEAR FORM
function clearForm(){
  name.value="";
  phone.value="";
  address.value="";
  relation.value="";
  photo.value="";
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    loadMembers();
  }
});

</script>

</body>
</html>
